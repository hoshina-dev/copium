name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: Build
        run: go build ./...
      - name: Unit tests (race + cover)
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 30

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - name: Integration tests (testcontainers + mailhog)
        run: go test -tags=integration -race -count=1 -timeout=10m ./...

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: --timeout=5m
