run:
  timeout: 5m
  tests: true
  build-tags:
    - integration

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose

linters-settings:
  revive:
    rules:
      - name: var-naming
        disabled: true
      - name: package-comments
        disabled: true
